name: Backend CI

on:
  push:
    paths:
      - 'LQRAgent/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'LQRAgent/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LQRAgent/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Unit tests (no LLM)
        run: mvn test -q

      - name: Intent suite integration (optional)
        if: env.LQR_INTENT_SUITE == 'true'
        env:
          LQR_INTENT_SUITE: true
          MYSQL_URL: ${{ secrets.MYSQL_URL }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: mvn test -Dtest=PlanningAgentIntentIntegrationTest -q
