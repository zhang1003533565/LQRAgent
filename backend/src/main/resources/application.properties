spring.application.name=lqragent-backend
server.port=8080

# 控制台日志编码（IDE 与 chcp 65001 终端均为 UTF-8，Windows 原生 cmd 需 chcp 65001）
logging.charset.console=UTF-8

# ── MySQL ──────────────────────────────────────────────────────────────────
# 可通过环境变量覆盖：MYSQL_URL / MYSQL_USER / MYSQL_PASSWORD
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── SQL 初始化（补全全部业务表；含旧库增量补丁，可重复执行）────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init-tables.sql

# ── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=change-this-to-a-long-random-secret-at-least-256-bits
jwt.expiration-ms=86400000

# ── Redis（消息队列，Docker: localhost:6379）──────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000

# ── AI Server ──────────────────────────────────────────────────────────────
ai-server.base-url=http://localhost:8001
ai-server.ws-url=ws://localhost:8001/api/v1/ws
ai-server.auto-start=true

# ── RAG 知识库名称（ai-server 侧）──────────────────────────────────────────
# 公共库 kb-public 需先上传资料；不存在时 RagSearchTool 会 fallback 到 kb-private-{userId}
# 向量存储由 ai-server/.env 的 RAG_STORAGE_BACKEND=chroma 控制（Docker Chroma :8000）
agent.rag.kb_name=lqragent-uploads
agent.rag.kb_public=kb-public
agent.rag.kb_private_prefix=kb-private-

# ── 启动后控制台（sys_config 可覆盖上方配置，控制台命令 set/del/config）──
app.console.enabled=false

# ── SpringDoc OpenAPI ────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# ── Upload Queue ───────────────────────────────────────────────────────────
upload.queue.worker-interval-ms=30000
upload.queue.max-concurrent=2

# ── AI Server 配置 ─────────────────────────────────────────────────────────
ai-server.auto-start=true
ai-server.use-agentic-pipeline=false

# ── Multipart 上传限制 ────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

