spring.application.name=lqragent-backend
server.port=8080

# 控制台日志 UTF-8（Windows 终端需配合 chcp 65001 或 VS Code 终端 UTF-8）
logging.charset.console=UTF-8

# ── MySQL ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── SQL 初始化（补全全部业务表；含旧库增量补丁，可重复执行）────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init-tables.sql

# ── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=change-this-to-a-long-random-secret-at-least-256-bits
jwt.expiration-ms=86400000

# ── AI Server ──────────────────────────────────────────────────────────────
ai-server.base-url=http://localhost:8001
ai-server.ws-url=ws://localhost:8001/api/v1/ws
ai-server.auto-start=true

# ── 启动后控制台（sys_config 可覆盖上方配置，控制台命令 set/del/config）──
app.console.enabled=true

# ── Upload Queue ───────────────────────────────────────────────────────────
upload.queue.worker-interval-ms=5000
upload.queue.max-concurrent=2
